workspace_path: /home/user/vault
debounce_interval: 300ms
event_log_retention: 720h
index_cache_path: /home/user/vault/.annotate/index.sqlite
excluded_namespaces:
  - people.*
  - private.*
namespace_policies:
  "projects.*":
    max_links: 15
    max_tags: 5
    adjacent_notes_count: 0
    date_format: ""
  "daily.journal.*":
    max_links: 0
    max_tags: 8
    adjacent_notes_count: 3
    date_format: "2006-01-02"
ai_provider:
  provider: anthropic
  model: claude-opus-4-6
  api_key_env: ANTHROPIC_API_KEY
  max_tokens: 4096
