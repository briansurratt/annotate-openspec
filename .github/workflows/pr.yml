name: PR

on:
  pull_request:
    branches: ["**"]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

  build-macos:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build for macOS (arm64)
        run: GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/annotate-darwin-arm64 ./cmd/annotate

      - name: Build for macOS (amd64)
        run: GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/annotate-darwin-amd64 ./cmd/annotate

      - name: Upload macOS binaries
        uses: actions/upload-artifact@v4
        with:
          name: annotate-macos
          path: dist/
          if-no-files-found: error
          retention-days: 14
